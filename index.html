<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ci-green: #007947; --ci-red: #F40000; --bg-white: #ffffff; }

  body {
    font-family: 'Figtree', 'Kanit', sans-serif;
    background: transparent; margin: 0; padding: 20px;
    display: flex; justify-content: center;
  }

  /* --- Game Card Wrapper --- */
  .game-card {
    width: 100%; max-width: 1100px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 30px;
    border: 1px solid rgba(0, 121, 71, 0.15);
    display: flex; flex-wrap: wrap;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0, 79, 71, 0.1);
    position: relative;
  }

  /* รัศมีเรืองแสงตกแต่ง */
  .game-card::before {
    content: ''; position: absolute; top: -50%; left: -20%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0, 121, 71, 0.05) 0%, transparent 70%);
    z-index: 0;
  }

  /* --- ฝั่งข้อความ (Left Side) --- */
  .content-side {
    flex: 1; min-width: 300px; padding: 50px;
    display: flex; flex-direction: column; justify-content: center;
    z-index: 1;
  }

  .game-badge {
    background: rgba(244, 0, 0, 0.1); color: var(--ci-red);
    padding: 6px 16px; border-radius: 50px; font-size: 13px;
    font-weight: 700; width: fit-content; margin-bottom: 20px;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .main-title { font-size: 32px; font-weight: 800; color: var(--ci-green); margin: 0; line-height: 1.2; }
  .sub-title { font-size: 16px; color: #64748b; margin: 15px 0 30px 0; line-height: 1.6; }

  .play-btn {
    background: linear-gradient(135deg, #007947 0%, #0b7a42 100%);
    color: white; text-decoration: none; padding: 15px 35px;
    border-radius: 50px; font-weight: 600; font-size: 16px;
    width: fit-content; transition: 0.3s;
    box-shadow: 0 10px 20px rgba(0, 121, 71, 0.2);
    display: flex; align-items: center; gap: 10px;
  }
  .play-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 121, 71, 0.3); }

  /* --- ฝั่งตัวเกม (Right Side) --- */
  .game-side {
    flex: 1.5; min-width: 450px; background: #f8fafc;
    position: relative; min-height: 500px;
    border-left: 1px solid rgba(0, 121, 71, 0.05);
  }

  .game-frame {
    width: 100%; height: 100%; border: none;
    background: white;
  }

  @media (max-width: 768px) {
    .game-card { flex-direction: column; }
    .game-side { min-width: 100%; min-height: 400px; border-left: none; border-top: 1px solid rgba(0, 121, 71, 0.05); }
    .content-side { padding: 40px 30px; text-align: center; align-items: center; }
  }
</style>
</head>
<body>

<div class="game-card">
  <div class="content-side">
    <div class="game-badge">Interactive Learning</div>
    <h1 class="main-title">CGRM Challenge<br>ร่วมสนุกทดสอบความรู้</h1>
    <p class="sub-title">มาร่วมค้นหาพฤติกรรมที่ไม่เหมาะสม และเรียนรู้หลักการธรรมาภิบาลผ่านสถานการณ์จำลองในที่ทำงาน เพื่อสะสมคะแนนลุ้นรับรางวัล Risk Award!</p>
    
    <a href="https://cgrmgame.lovable.app/" target="_blank" class="play-btn">
      <span>🎮</span> เปิดหน้าจอเต็มเพื่อเริ่มเล่น
    </a>
  </div>

  <div class="game-side">
    <iframe src="https://cgrmgame.lovable.app/" class="game-frame" scrolling="no"></iframe>
  </div>
</div>

</body>
</html>
