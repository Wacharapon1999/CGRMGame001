<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root { --ci-green: #007947; --ci-red: #F40000; }

  /* ✅ ปรับ Body ให้ไร้แถบเลื่อน */
  body, html {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden; /* ซ่อนแถบเลื่อนที่ตัว Body */
    background: transparent;
    font-family: 'Figtree', 'Kanit', sans-serif;
  }

  .wrapper {
    display: flex; justify-content: center; align-items: center;
    width: 100%; height: 100vh; padding: 10px; box-sizing: border-box;
  }

  /* --- Premium Game Card --- */
  .game-card {
    width: 100%; max-width: 1100px;
    height: calc(100vh - 40px); /* ปรับความสูงให้พอดีหน้าจอ */
    max-height: 700px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(0, 121, 71, 0.15);
    display: flex; overflow: hidden; /* ซ่อนแถบเลื่อนที่ตัว Card */
    box-shadow: 0 20px 50px rgba(0, 79, 71, 0.1);
  }

  /* --- Left Side: Content --- */
  .content-side {
    flex: 1; min-width: 320px; padding: 40px;
    display: flex; flex-direction: column; justify-content: center;
    z-index: 1;
  }

  .large-gamepad-icon {
    font-size: 60px; color: var(--ci-green); margin-bottom: 15px;
    filter: drop-shadow(0 0 10px rgba(0, 121, 71, 0.3));
    animation: gamepadFloat 4s ease-in-out infinite;
  }

  @keyframes gamepadFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .game-badge {
    background: rgba(244, 0, 0, 0.08); color: var(--ci-red);
    padding: 5px 15px; border-radius: 50px; font-size: 12px;
    font-weight: 700; width: fit-content; margin-bottom: 15px;
    border: 1px solid rgba(244, 0, 0, 0.1);
  }

  .main-title { font-size: 28px; font-weight: 800; color: var(--ci-green); margin: 0; line-height: 1.2; }
  .sub-title { font-size: 14px; color: #475569; margin: 15px 0 30px 0; line-height: 1.6; }

  .play-btn {
    background: linear-gradient(135deg, #007947 0%, #0b7a42 100%);
    color: white; text-decoration: none; padding: 14px 30px;
    border-radius: 50px; font-weight: 600; font-size: 15px;
    width: fit-content; transition: 0.3s;
    box-shadow: 0 8px 15px rgba(0, 121, 71, 0.2);
    display: flex; align-items: center; gap: 10px;
  }

  /* --- Right Side: Game Iframe --- */
  .game-side {
    flex: 1.5; background: #fff;
    height: 100%; border-left: 1px solid rgba(0, 121, 71, 0.08);
    overflow: hidden; /* บล็อกแถบเลื่อนในส่วนเกม */
  }

  .game-frame {
    width: 100%; height: 100%;
    border: none; display: block;
    overflow: hidden; /* ป้องกันแถบเลื่อนที่ iFrame */
  }

  @media (max-width: 850px) {
    .game-card { flex-direction: column; overflow-y: auto; height: auto; }
    .game-side { height: 400px; border-left: none; }
    .content-side { padding: 30px; text-align: center; align-items: center; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="game-card">
    <div class="content-side">
      <i class="fas fa-gamepad large-gamepad-icon"></i>
      <div class="game-badge">Interactive Learning</div>
      <h1 class="main-title">CGRM Challenge<br>พิชิตภารกิจธรรมาภิบาล</h1>
      <p class="sub-title">ค้นหาพฤติกรรมเสี่ยงและสะสมคะแนนลุ้นรับรางวัล <b>Risk Award</b> ประจำสัปดาห์นี้ครับคุณ Games!</p>
      <a href="https://cgrmgame.lovable.app/" target="_blank" class="play-btn">
        <i class="fas fa-expand"></i> เล่นแบบเต็มหน้าจอ
      </a>
    </div>
    <div class="game-side">
      <iframe src="https://cgrmgame.lovable.app/" class="game-frame" scrolling="no"></iframe>
    </div>
  </div>
</div>

</body>
</html>
